<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"th:replace="layouts/main :: html">
<div th:fragment="content">
    <!-- Products Header -->
    <div class="page-header">
        <div class="header-left">
            <h1><i class="fas fa-box"></i> Products</h1>
            <p>Manage your inventory</p>
        </div>
        <button class="btn btn-primary" data-modal="addProductModal">
            <i class="fas fa-plus"></i> Add Product
        </button>
    </div>

    <!-- Products Table -->
    <div class="card">
        <div class="card-header">
            <h3>All Products</h3>
            <div class="table-actions">
                <input type="text" id="searchInput" placeholder="Search products..." class="form-input">
            </div>
        </div>
        <div class="card-body">
            <div class="table-container">
                <table id="productsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${products}">
                            <td th:text="${product.id}">1</td>
                            <td th:text="${product.name}">Product Name</td>
                            <td th:text="${#numbers.formatDecimal(product.price, 1, 2)}">$0.00</td>
                            <td>
                                <span th:text="${product.quantity}"
                                    th:class="'stock-badge ' + (${product.quantity} > 5 ? 'stock-good' : 'stock-low')">
                                </span>
                            <td>
                                <span class="status-badge active">Active</span>
                            </td>
                            <td>
                                <button class="btn btn-sm btn-success" th:if="${product.quantity > 0}" th:onclick="'makeSale(' + ${product.id} + ')'">
                                    <i class="fas fa-shopping-cart"></i>
                                </button>
                                <button class="btn btn-sm btn-warning" th:onclick="'editProduct(' + ${product.id} + ')'">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn btn-sm btn-danger" th:onclick="'deleteProduct(' + ${product.id} + ')'">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(products)}">
                            <td colspan="6" class="empty-state">
                                <i class="fas fa-box-open"></i>
                                <p>No products found</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add/Edit Product Modal -->
    <div id="addProductModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add New Product</h3>
                <button class="modal-close" onclick="closeModal('addProductModal')">&times;</button>
            </div>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="productName" class="form-input" required>
                </div>
                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" id="productPrice" step="0.01" class="form-input" required>
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="productQuantity" class="form-input" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('addProductModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Product</button>
                </div>
            </form>
        </div>
    </div>
</div>
</html>
